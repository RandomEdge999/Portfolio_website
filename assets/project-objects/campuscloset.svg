<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1040" viewBox="0 0 720 520" fill="none">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2b301f"/>
      <stop offset="1" stop-color="#111112"/>
    </linearGradient>
  </defs>
  <style>
    .a{stroke:#d9ff30;stroke-width:2;stroke-linecap:square;stroke-linejoin:miter;filter:url(#glow)}
    .b{stroke:#d9ff30;stroke-width:4;stroke-linecap:square;stroke-linejoin:miter;filter:url(#glow)}
    .c{fill:#d9ff30;filter:url(#glow)}
    .d{fill:#f4f4ed;opacity:.72}
    .dark{stroke:#141414;stroke-width:4;stroke-linecap:square}
    .box{fill:url(#panel);stroke:#f4f4ed;stroke-width:2;opacity:.96}
    .screen,.panel,.cube{fill:#151812;stroke:#d9ff30;stroke-width:2;opacity:.94}
    .paper{fill:#f4f4ed;stroke:#111112;stroke-width:2;opacity:.95}
    .side{opacity:.74}
    .tilt{transform:rotate(-8deg);transform-origin:center}
    .ring,.orbit{stroke:#d9ff30;stroke-width:3;opacity:.84}
    .orbit{stroke-dasharray:12 18;opacity:.7}
    .map,.wave{stroke:#f4f4ed;stroke-width:3;opacity:.74}
    .hand{fill:#f4f4ed;stroke:#111112;stroke-width:3;opacity:.92}
    .highlight,.petal{fill:#d9ff30;opacity:.55}
    .hanger{stroke:#d9ff30;stroke-width:3;fill:none;opacity:.86}
    .thick{stroke-width:5}
  </style>
